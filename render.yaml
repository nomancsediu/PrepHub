services:
  - type: web
    name: prep-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn backend.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: prep-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-netlify-app.netlify.app
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
